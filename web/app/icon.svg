<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f43f5e" /> <!-- Rose 500 -->
      <stop offset="50%" stop-color="#fb923c" /> <!-- Orange 400 -->
      <stop offset="100%" stop-color="#fcd34d" /> <!-- Amber 300 -->
